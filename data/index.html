<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>Team Hope</title>
    <link rel="stylesheet" 
          href="style.css">
    <link rel="stylesheet" 
          href="responsive.css">
    <link rel="icon" href="/favicon.ico" type="image/vnd.microsoft.icon">
</head>

<body>
  
    <!-- for header part -->
    <header>

        <div class="logosec">
            <img src="img/hopesprung.svg"
                class="icn" 
                id="hopelogo" 
                alt="hopelogo">
            <img src= "img/menu.svg"
                class="icn menuicn" 
                id="menuicn" 
                alt="menu-icon">                
        </div>

        <div class="productbar">
            <div class="logo">Hope Cam</div>
        </div>

        <div class="message " >
            <div class="imgbox ">
                <img id="ledBtn" src= "img/light_off.svg" 
                 class="icn no-alert-img" 
                 alt="">
            </div>
            <script>
                const ledBtn = document.getElementById("ledBtn");
                let ledOn = false;
              
                ledBtn.onclick = () => {
                  ledOn = !ledOn;
                  fetch(`/led?on=${ledOn ? 1 : 0}`)
                    .then(res => res.text())
                    .then(msg => {
                        ledBtn.src = ledOn
                            ? "img/light_on.svg"
                            : "img/light_off.svg";
                        console.log(msg);
                    });
                };
              </script>
        </div>

    </header>

    <div class="main-container">
        <div class="navcontainer">
                <nav class="nav">
                <div class="nav-upper-options">
                    <div class="nav-option option_selected">
                        <div class="imgbox">
                            <img src= "img/home.svg"
                            class="nav-img" 
                            alt="home">
                        </div>
                        <h3> Overview </h3>
                    </div>

                    <div id="loadNetwork" class="nav-option option_notselected" >
                        <div class="imgbox">
                            <img src= "img/network.svg"
                            class="nav-img" 
                            alt="network">
                        </div>
                        <h3> Network<br/>Settings</h3>
                    </div>
                    <script>
                        const loadNetwork = document.getElementById("loadNetwork");
                        loadNetwork.onclick = () => {
                            window.location.href = "network.html"; // Path to the page you want to load));                   
                        };
                    </script>
                </div>
            </nav>
        </div>
        <div class="main">

            <div class="stream-container">
                <div class="stream-header">
                    <h1 class="recent-Log">Live Stream</h1>
                </div>

                    <div class="stream-body" style="width: 400px; height: 400px; position: relative;">
                        <img src="/stream" style="position: absolute;transform: translate(75%,0) rotate(90deg);transform-origin: top left;"/>
                    </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
