<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>Team Hope</title>
    <link rel="stylesheet" 
          href="style.css">
    <link rel="stylesheet" 
          href="responsive.css">
</head>

<body>
  
    <!-- for header part -->
    <header>

        <div class="logosec">
            <img src="img/hopesprung.svg"
                class="icn" 
                id="hopelogo" 
                alt="hopelogo">
            <img src= "img/menu.svg"
                class="icn menuicn" 
                id="menuicn" 
                alt="menu-icon">                
        </div>

        <div class="productbar">
            <div class="logo">Hope Cam</div>
        </div>

        <div class="message " >
            <div class="imgbox ">
                <img src= "img/light_off.svg" 
                 class="icn no-alert-img" 
                 alt="">
            </div>
        </div>

    </header>

    <div class="main-container">
        <div class="navcontainer">
                <nav class="nav">
                <div class="nav-upper-options">
                    <div class="nav-option option1">
                        <div class="imgbox">
                            <img src= "img/home.svg"
                            class="nav-img" 
                            alt="home">
                        </div>
                        <h3> Overview </h3>
                    </div>

                    <div class="nav-option option3">
                        <div class="imgbox">
                            <img src= "img/network.svg"
                            class="nav-img" 
                            alt="network">
                        </div>
                        <h3> Network<br/>Setting</h3>
                    </div>

                </div>
            </nav>
        </div>
        <div class="main">

            <div class="stream-container">
                <div class="stream-header">
                    <h1 class="recent-Log">Live Stream</h1>
                </div>

                <div class="stream-body">

                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
